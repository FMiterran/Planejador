<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Planejador" />
  <meta name="theme-color" content="#0D0D14" />
  <title>Meu Planejador</title>
  <style>
    :root {
      --bg:        #0D0D14;
      --bg2:       #13131E;
      --card:      #1A1A2A;
      --card2:     #20202F;
      --border:    #2A2A3E;
      --accent:    #C9A84C;
      --text:      #E8E4DC;
      --text2:     #9A94A8;
      --text3:     #5C5870;
      --blue:      #5B9BD5;
      --green:     #27AE60;
      --red-text:  #E87070;
      --red-dot:   #E74C3C;
      --ora-bg:    #2A1E10;
      --ora-text:  #D4954A;
      --ora-dot:   #E67E22;
      --grn-bg:    #102A18;
      --grn-text:  #5DBE80;
      --grn-dot:   #27AE60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: Georgia, 'Times New Roman', serif; }
    body { overflow-x: hidden; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

    /* HEADER */
    #header { background: var(--bg2); padding: 52px 20px 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
    #header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    #header-subtitle { color: var(--text3); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-family: monospace; }
    #header-title { color: var(--text); font-size: 22px; font-weight: bold; margin-top: 3px; }
    #header-btn { background: rgba(255,255,255,0.07); border: none; border-radius: 10px; width: 38px; height: 38px; font-size: 18px; cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; }
    #header-btn.active { background: var(--accent); color: var(--bg); }

    /* DATE TABS */
    #date-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .date-tab { background: rgba(255,255,255,0.06); color: var(--text2); border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: monospace; transition: background 0.15s, color 0.15s; }
    .date-tab.active { background: var(--accent); color: var(--bg); font-weight: bold; }
    .date-tab.dashed { border: 1px dashed var(--border); color: var(--text3); }

    /* CONTENT */
    #content { padding: 16px 16px 110px; }

    /* PROGRESS */
    #progress-bar-wrap { background: var(--card); border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; border: 1px solid var(--border); }
    #progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-family: monospace; font-size: 13px; }
    #progress-label { color: var(--text2); }
    #progress-pct { font-weight: bold; }
    #progress-track { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
    #progress-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
    #progress-congrats { text-align: center; margin-top: 8px; font-size: 13px; color: var(--green); font-weight: bold; display: none; }

    /* FILTERS */
    #filters { display: flex; gap: 6px; margin-bottom: 14px; }
    .filter-btn { background: var(--card); color: var(--text2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: monospace; transition: all 0.15s; }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* TASKS */
    .task-card { background: var(--card); border-radius: 14px; margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden; transition: opacity 0.2s, transform 0.15s; }
    .task-card.done { opacity: 0.5; }
    .task-card.dragging { opacity: 0.3; border: 2px dashed var(--accent) !important; transform: scale(0.98); }
    .task-card.drag-over { border-top: 3px solid var(--accent) !important; transform: translateY(2px); }
    .task-main { display: flex; align-items: center; padding: 12px 12px 12px 8px; gap: 10px; }

    /* DRAG HANDLE */
    .drag-handle { display: flex; flex-direction: column; gap: 4px; padding: 8px 6px; cursor: grab; flex-shrink: 0; touch-action: none; user-select: none; }
    .drag-handle span { display: block; width: 18px; height: 2px; background: var(--text3); border-radius: 2px; }
    .drag-handle:active { cursor: grabbing; }

    .task-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; transition: all 0.2s; }
    .task-check.checked { border: none; color: #fff; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; font-weight: 600; color: var(--text); word-break: break-word; }
    .task-title.done { text-decoration: line-through; color: var(--text3); }
    .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
    .task-time { font-size: 12px; color: var(--blue); font-family: monospace; font-weight: bold; }
    .task-cat { font-size: 12px; color: var(--text3); }
    .task-pri { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-family: monospace; font-weight: bold; }
    .task-note { font-size: 13px; color: var(--text3); margin-top: 5px; font-style: italic; }
    .task-menu-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; padding: 0 4px; flex-shrink: 0; }
    .task-actions { display: flex; border-top: 1px solid var(--border); }
    .task-action-btn { flex: 1; padding: 10px; background: none; border: none; cursor: pointer; font-size: 13px; font-family: monospace; }

    /* EMPTY */
    #empty { text-align: center; padding: 60px 20px; color: var(--text3); }
    #empty-icon { font-size: 44px; margin-bottom: 14px; }
    #empty-msg { font-size: 15px; line-height: 1.5; }

    /* NOTES */
    #note-label { font-size: 12px; color: var(--text3); font-family: monospace; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
    #note-area { width: 100%; min-height: 80px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 14px; color: var(--text); font-family: Georgia, serif; resize: vertical; outline: none; }
    #note-area::placeholder { color: var(--text3); }

    /* OVERVIEW */
    #overview { padding: 20px 16px 100px; }
    #overview-title { font-size: 18px; font-weight: bold; color: var(--text); margin-bottom: 16px; }
    .ov-card { background: var(--card); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border); border-left: 4px solid var(--border); }
    .ov-card.today { border-left-color: var(--accent); }
    .ov-card.tomorrow { border-left-color: var(--blue); }
    .ov-card-top { display: flex; justify-content: space-between; align-items: center; }
    .ov-card-title { font-weight: bold; color: var(--text); font-size: 15px; }
    .ov-card-sub { color: var(--text3); font-size: 12px; margin-top: 2px; font-family: monospace; }
    .ov-pct { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; flex-shrink: 0; }
    .ov-bar-track { background: var(--border); border-radius: 4px; height: 4px; margin-top: 10px; }
    .ov-bar-fill { height: 100%; border-radius: 4px; }

    /* FAB */
    #fab { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); border: none; border-radius: 50%; width: 58px; height: 58px; font-size: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 24px rgba(201,168,76,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; transition: transform 0.15s; }
    #fab:active { transform: translateX(-50%) scale(0.93); }

    /* MODAL */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal { background: var(--bg2); border-radius: 22px 22px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.25s ease; border-top: 1px solid var(--border); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 17px; font-weight: bold; color: var(--text); }
    .modal-close { background: var(--card); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; }
    .field-label { display: block; font-size: 11px; color: var(--text3); font-family: monospace; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .field-input { width: 100%; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; font-size: 15px; color: var(--text); margin-bottom: 16px; outline: none; font-family: Georgia, serif; transition: border-color 0.15s; }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--text3); }
    .pri-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .pri-btn { flex: 1; padding: 9px 4px; border: 2px solid var(--border); background: var(--card); color: var(--text2); border-radius: 10px; cursor: pointer; font-size: 13px; font-family: monospace; text-transform: capitalize; text-align: center; }
    .cat-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .cat-btn { padding: 6px 12px; border: 2px solid transparent; background: var(--card2); color: var(--text2); border-radius: 20px; cursor: pointer; font-size: 12px; font-family: monospace; }
    .cat-btn.active { border-color: var(--accent); background: rgba(201,168,76,0.12); color: var(--accent); }
    .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: var(--bg); border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-family: Georgia, serif; }
    .btn-primary:disabled { opacity: 0.35; cursor: default; }
    .btn-secondary { width: 100%; padding: 12px; background: transparent; color: var(--text3); border: none; border-radius: 12px; font-size: 14px; cursor: pointer; font-family: monospace; }
    .datepick-modal { background: var(--bg2); border-radius: 20px; padding: 24px 20px; width: calc(100% - 40px); max-width: 340px; animation: slideUp 0.2s ease; border: 1px solid var(--border); }
    .overlay-center { align-items: center; }

    /* GHOST (drag clone) */
    #drag-ghost { position: fixed; pointer-events: none; z-index: 9999; opacity: 0.85; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); left: 0; top: 0; }

    /* TOAST */
    #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--card2); color: var(--text); padding: 10px 22px; border-radius: 50px; font-size: 14px; font-family: monospace; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 9999; white-space: nowrap; border: 1px solid var(--border); display: none; pointer-events: none; }
    #toast.warn { background: #2A0E0E; color: var(--red-text); border-color: var(--red-dot); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    input[type=time], input[type=date] { color-scheme: dark; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <div>
        <div id="header-subtitle">Meu Planejador</div>
        <div id="header-title">—</div>
      </div>
      <button id="header-btn" onclick="toggleView()">📅</button>
    </div>
    <div id="date-tabs"></div>
  </div>

  <div id="day-view">
    <div id="content">
      <div id="progress-bar-wrap" style="display:none">
        <div id="progress-top">
          <span id="progress-label"></span>
          <span id="progress-pct"></span>
        </div>
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="progress-congrats">🎉 Dia completo! Incrível!</div>
      </div>
      <div id="filters" style="display:none">
        <button class="filter-btn active" onclick="setFilter('todas')">Todas</button>
        <button class="filter-btn" onclick="setFilter('pendentes')">Pendentes</button>
        <button class="filter-btn" onclick="setFilter('feitas')">Feitas</button>
      </div>
      <div id="task-list"></div>
      <div id="empty">
        <div id="empty-icon">✏️</div>
        <div id="empty-msg">Nenhuma atividade ainda.<br>Toque em + para começar!</div>
      </div>
      <div id="note-label">📝 Anotações do dia</div>
      <textarea id="note-area" placeholder="Escreva algo sobre o dia, lembretes, ideias..."></textarea>
    </div>
  </div>

  <div id="overview-view" style="display:none">
    <div id="overview">
      <div id="overview-title">Visão Geral</div>
      <div id="ov-list"></div>
    </div>
  </div>

  <button id="fab" onclick="openAddModal()">+</button>
</div>

<!-- Ghost element for drag -->
<div id="drag-ghost" style="display:none"></div>

<!-- TASK MODAL -->
<div class="overlay" id="task-modal" style="display:none" onclick="handleOverlayClick(event,'task-modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title-text">Nova atividade</div>
      <button class="modal-close" onclick="closeModal('task-modal')">✕</button>
    </div>
    <label class="field-label">Nome da atividade *</label>
    <input class="field-input" id="task-title-input" placeholder="Ex: Reunião com cliente" />
    <label class="field-label">Horário</label>
    <input class="field-input" id="task-time-input" type="time" />
    <label class="field-label">Prioridade</label>
    <div class="pri-row" id="pri-row"></div>
    <label class="field-label">Categoria</label>
    <div class="cat-row" id="cat-row"></div>
    <label class="field-label">Observação (opcional)</label>
    <textarea class="field-input" id="task-note-input" placeholder="Detalhes, lembretes..." style="min-height:60px;resize:vertical;font-family:Georgia,serif"></textarea>
    <button class="btn-primary" id="modal-save-btn" onclick="saveTask()">Adicionar atividade</button>
    <button class="btn-secondary" onclick="closeModal('task-modal')">Cancelar</button>
  </div>
</div>

<!-- DATE PICKER -->
<div class="overlay overlay-center" id="date-modal" style="display:none" onclick="handleOverlayClick(event,'date-modal')">
  <div class="datepick-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">Ir para outro dia</div>
      <button class="modal-close" onclick="closeModal('date-modal')">✕</button>
    </div>
    <label class="field-label">Data</label>
    <input class="field-input" id="date-picker-input" type="date" />
    <button class="btn-primary" onclick="goToCustomDate()">Ir para o dia</button>
    <button class="btn-secondary" onclick="closeModal('date-modal')">Cancelar</button>
  </div>
</div>

<div id="toast"></div>

<script>
const STORAGE_KEY = "planner_dark_v1";
const DAYS_PT   = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MONTHS_PT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

const PRIORITIES = [
  { key:"alta",  label:"Alta",  dot:"#E74C3C", bg:"#2A1515", text:"#E87070" },
  { key:"média", label:"Média", dot:"#E67E22", bg:"#2A1E10", text:"#D4954A" },
  { key:"baixa", label:"Baixa", dot:"#27AE60", bg:"#102A18", text:"#5DBE80" },
];
const CATEGORIES = [
  { key:"trabalho", icon:"💼" },
  { key:"pessoal",  icon:"🙋" },
  { key:"saúde",    icon:"🏃" },
  { key:"estudos",  icon:"📚" },
  { key:"casa",     icon:"🏠" },
  { key:"outro",    icon:"📌" },
];

let state = {
  days: {}, activeDate: todayStr(), view: "day", filter: "todas",
  editingTaskId: null, selectedPri: "média", selectedCat: "outro",
};

function todayStr() {
  const d = new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function tomorrowStr() {
  const d = new Date(); d.setDate(d.getDate()+1);
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,"0"); }
function uid() { return Math.random().toString(36).slice(2,10); }
function formatDate(s) {
  const [y,m,d] = s.split("-").map(Number);
  const dt = new Date(y,m-1,d);
  return DAYS_PT[dt.getDay()]+", "+d+" "+MONTHS_PT[m-1];
}
function dateLabel(date) {
  if(date===todayStr()) return "Hoje";
  if(date===tomorrowStr()) return "Amanhã";
  return formatDate(date);
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function load() {
  try { const r=localStorage.getItem(STORAGE_KEY); if(r) state.days=JSON.parse(r); } catch {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.days)); } catch {}
}
function getDay(date) { return state.days[date]||{tasks:[],note:""}; }
function setDay(date, data) { state.days[date]=data; save(); }

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, warn) {
  const el=document.getElementById("toast");
  el.textContent=msg; el.className=warn?"warn":""; el.style.display="block";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display="none",2200);
}

// ─── DRAG & DROP (touch) ─────────────────────────────────────────────────────
let drag = { active:false, taskId:null, startY:0, ghost:null, sourceIdx:-1, overIdx:-1 };

function initDrag(handle, taskId) {
  handle.addEventListener("touchstart", e => {
    if(state.filter !== "todas") return; // only allow drag in "all" view
    e.preventDefault();
    const touch = e.touches[0];
    const card = document.getElementById("tc-"+taskId);
    if(!card) return;

    const rect = card.getBoundingClientRect();
    const ghost = document.getElementById("drag-ghost");
    ghost.style.display = "block";
    ghost.style.width = rect.width+"px";
    ghost.style.height = rect.height+"px";
    ghost.style.left = rect.left+"px";
    ghost.style.top = rect.top+"px";
    ghost.style.background = "#1A1A2A";
    ghost.style.border = "2px solid #C9A84C";
    ghost.innerHTML = card.innerHTML;

    card.classList.add("dragging");

    drag.active = true;
    drag.taskId = taskId;
    drag.startY = touch.clientY - rect.top;
    drag.ghost = ghost;

    const day = getDay(state.activeDate);
    drag.sourceIdx = day.tasks.findIndex(t=>t.id===taskId);
    drag.overIdx = drag.sourceIdx;
  }, {passive:false});

  handle.addEventListener("touchmove", e => {
    if(!drag.active) return;
    e.preventDefault();
    const touch = e.touches[0];
    drag.ghost.style.top = (touch.clientY - drag.startY)+"px";

    // find which card we're over
    const cards = document.querySelectorAll(".task-card:not(.dragging)");
    let newOver = drag.sourceIdx;
    cards.forEach(c => {
      const r = c.getBoundingClientRect();
      const mid = r.top + r.height/2;
      if(touch.clientY > mid) {
        const id = c.id.replace("tc-","");
        const day = getDay(state.activeDate);
        const idx = day.tasks.findIndex(t=>t.id===id);
        if(idx > newOver || newOver === drag.sourceIdx) newOver = idx;
      }
    });

    if(newOver !== drag.overIdx) {
      drag.overIdx = newOver;
      document.querySelectorAll(".task-card").forEach(c=>c.classList.remove("drag-over"));
      const targetId = getDay(state.activeDate).tasks[newOver]?.id;
      if(targetId && targetId !== drag.taskId) {
        const tc = document.getElementById("tc-"+targetId);
        if(tc) tc.classList.add("drag-over");
      }
    }
  }, {passive:false});

  handle.addEventListener("touchend", e => {
    if(!drag.active) return;
    drag.ghost.style.display = "none";
    document.querySelectorAll(".task-card").forEach(c=>{
      c.classList.remove("dragging","drag-over");
    });

    const day = getDay(state.activeDate);
    const tasks = [...day.tasks];
    const from = drag.sourceIdx;
    const to = drag.overIdx;

    if(from !== to && to >= 0 && to < tasks.length) {
      const item = tasks.splice(from,1)[0];
      tasks.splice(to,0,item);
      setDay(state.activeDate, {...day, tasks});
      showToast("Ordem atualizada ✓");
    }

    drag.active = false;
    drag.taskId = null;
    renderDay();
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  renderHeader();
  if(state.view==="day") {
    document.getElementById("day-view").style.display="";
    document.getElementById("overview-view").style.display="none";
    document.getElementById("fab").style.display="";
    renderDay();
  } else {
    document.getElementById("day-view").style.display="none";
    document.getElementById("overview-view").style.display="";
    document.getElementById("fab").style.display="none";
    renderOverview();
  }
}

function renderHeader() {
  document.getElementById("header-title").textContent=dateLabel(state.activeDate);
  const btn=document.getElementById("header-btn");
  btn.textContent=state.view==="day"?"📅":"📋";
  btn.className=state.view==="overview"?"active":"";

  const today=todayStr(), tomorrow=tomorrowStr();
  const others=Object.keys(state.days)
    .filter(d=>(state.days[d].tasks?.length>0||state.days[d].note)&&d!==today&&d!==tomorrow)
    .sort().slice(0,3);

  const tabs=[{label:"Hoje",date:today},{label:"Amanhã",date:tomorrow},
    ...others.map(d=>({label:formatDate(d),date:d}))];

  const container=document.getElementById("date-tabs");
  container.innerHTML="";
  tabs.forEach(({label,date})=>{
    const b=document.createElement("button");
    b.className="date-tab"+(state.activeDate===date?" active":"");
    b.textContent=label;
    b.onclick=()=>{state.activeDate=date;state.view="day";state.filter="todas";render();};
    container.appendChild(b);
  });
  const plus=document.createElement("button");
  plus.className="date-tab dashed"; plus.textContent="+ outro dia";
  plus.onclick=()=>document.getElementById("date-modal").style.display="flex";
  container.appendChild(plus);
}

function renderDay() {
  const day=getDay(state.activeDate);
  const tasks=[...day.tasks];
  const filtered=tasks.filter(t=>{
    if(state.filter==="pendentes") return !t.done;
    if(state.filter==="feitas") return t.done;
    return true;
  });

  const total=tasks.length;
  const done=tasks.filter(t=>t.done).length;
  const pct=total>0?Math.round((done/total)*100):0;

  const pbWrap=document.getElementById("progress-bar-wrap");
  if(total>0) {
    pbWrap.style.display="";
    document.getElementById("progress-label").textContent=done+" de "+total+(total===1?" atividade":" atividades");
    const pctEl=document.getElementById("progress-pct");
    pctEl.textContent=pct+"%";
    pctEl.style.color=pct===100?"var(--green)":"var(--accent)";
    const fill=document.getElementById("progress-fill");
    fill.style.width=pct+"%";
    fill.style.background=pct===100?"linear-gradient(90deg,#1A8040,#27AE60)":"linear-gradient(90deg,#A07830,#C9A84C)";
    document.getElementById("progress-congrats").style.display=pct===100?"":"none";
  } else {
    pbWrap.style.display="none";
  }

  document.getElementById("filters").style.display=total>0?"":"none";
  document.querySelectorAll(".filter-btn").forEach(b=>{
    const map={"Todas":"todas","Pendentes":"pendentes","Feitas":"feitas"};
    b.className="filter-btn"+(map[b.textContent]===state.filter?" active":"");
  });

  const list=document.getElementById("task-list");
  const empty=document.getElementById("empty");
  list.innerHTML="";

  if(filtered.length===0) {
    empty.style.display="";
    const icon=document.getElementById("empty-icon");
    const msg=document.getElementById("empty-msg");
    if(total===0){icon.textContent="✏️";msg.innerHTML="Nenhuma atividade ainda.<br>Toque em + para começar!";}
    else if(state.filter==="feitas"){icon.textContent="😴";msg.textContent="Nenhuma atividade concluída.";}
    else{icon.textContent="✅";msg.textContent="Tudo feito por aqui!";}
  } else {
    empty.style.display="none";
    filtered.forEach(task=>{
      const pri=PRIORITIES.find(p=>p.key===task.priority)||PRIORITIES[1];
      const cat=CATEGORIES.find(c=>c.key===task.category)||CATEGORIES[5];

      const card=document.createElement("div");
      card.className="task-card"+(task.done?" done":"");
      card.id="tc-"+task.id;

      // drag handle (only visible in "todas" filter)
      const handleHide = state.filter !== "todas" ? "opacity:0.2;pointer-events:none;" : "";

      card.innerHTML =
        '<div class="task-main">' +
          '<div class="drag-handle" style="'+handleHide+'" data-id="'+task.id+'">' +
            '<span></span><span></span><span></span>' +
          '</div>' +
          '<button class="task-check '+(task.done?"checked":"")+'" '+
            'style="'+(task.done?"background:"+pri.dot+";":'border-color:'+pri.dot+';')+'" '+
            'onclick="toggleDone(\''+task.id+'\')">'+
            (task.done?"✓":"")+
          '</button>' +
          '<div class="task-body">' +
            '<div class="task-title '+(task.done?"done":"")+'">'+esc(task.title)+'</div>' +
            '<div class="task-meta">' +
              (task.time?'<span class="task-time">🕐 '+task.time+'</span>':'')+
              '<span class="task-cat">'+cat.icon+' '+(task.category||"outro")+'</span>' +
              '<span class="task-pri" style="background:'+pri.bg+';color:'+pri.text+'">'+(task.priority||"média")+'</span>' +
            '</div>' +
            (task.note?'<div class="task-note">'+esc(task.note)+'</div>':'')+
          '</div>' +
          '<button class="task-menu-btn" onclick="toggleActions(\''+task.id+'\')">⋯</button>' +
        '</div>' +
        '<div class="task-actions" id="ta-'+task.id+'" style="display:none">' +
          '<button class="task-action-btn" style="color:var(--blue)" onclick="openEditModal(\''+task.id+'\')">✏️ Editar</button>' +
          '<button class="task-action-btn" style="color:var(--red-text)" onclick="deleteTask(\''+task.id+'\')">🗑️ Remover</button>' +
        '</div>';

      list.appendChild(card);

      // attach drag events to handle
      const handle = card.querySelector(".drag-handle");
      if(handle) initDrag(handle, task.id);
    });
  }

  const noteArea=document.getElementById("note-area");
  noteArea.value=day.note||"";
  noteArea.oninput=()=>{
    const d=getDay(state.activeDate);
    setDay(state.activeDate,{...d,note:noteArea.value});
  };
}

function renderOverview() {
  const today=todayStr(), tomorrow=tomorrowStr();
  const allDates=Object.keys(state.days)
    .filter(d=>state.days[d].tasks?.length>0||state.days[d].note).sort();
  const list=document.getElementById("ov-list");
  list.innerHTML="";
  if(allDates.length===0){
    list.innerHTML='<div style="text-align:center;color:var(--text3);padding:40px;font-size:15px">Nenhum dia planejado ainda.<br>Crie seu primeiro card!</div>';
    return;
  }
  allDates.forEach(date=>{
    const d=state.days[date];
    const total=d.tasks.length;
    const done=d.tasks.filter(t=>t.done).length;
    const pct=total>0?Math.round((done/total)*100):0;
    const isToday=date===today, isTomorrow=date===tomorrow;
    const card=document.createElement("div");
    card.className="ov-card"+(isToday?" today":isTomorrow?" tomorrow":"");
    card.onclick=()=>{state.activeDate=date;state.view="day";state.filter="todas";render();};
    const pctColor=total===0?"var(--text3)":done===total?"var(--green)":"var(--accent)";
    const pctBg=total===0?"var(--card2)":done===total?"var(--grn-bg)":"var(--ora-bg)";
    card.innerHTML=
      '<div class="ov-card-top">'+
        '<div>'+
          '<div class="ov-card-title">'+(isToday?"📅 Hoje":isTomorrow?"🌅 Amanhã":formatDate(date))+'</div>'+
          '<div class="ov-card-sub">'+done+'/'+total+' concluídas</div>'+
        '</div>'+
        '<div class="ov-pct" style="background:'+pctBg+';color:'+pctColor+'">'+
          (total===0?"—":pct+"%")+
        '</div>'+
      '</div>'+
      (total>0?'<div class="ov-bar-track"><div class="ov-bar-fill" style="width:'+pct+'%;background:'+(done===total?"var(--green)":"var(--accent)")+'"></div></div>':"");
    list.appendChild(card);
  });
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleView(){state.view=state.view==="day"?"overview":"day";render();}
function setFilter(f){state.filter=f;renderDay();}
function toggleDone(taskId){
  const day=getDay(state.activeDate);
  const task=day.tasks.find(t=>t.id===taskId);
  if(!task) return;
  task.done=!task.done;
  setDay(state.activeDate,day);
  if(task.done) showToast("Concluída! 🎉");
  renderDay();
}
function toggleActions(taskId){
  const el=document.getElementById("ta-"+taskId);
  if(el) el.style.display=el.style.display==="none"?"":"none";
}
function deleteTask(taskId){
  const day=getDay(state.activeDate);
  day.tasks=day.tasks.filter(t=>t.id!==taskId);
  setDay(state.activeDate,day);
  showToast("Removida",true);
  renderDay(); renderHeader();
}
function goToCustomDate(){
  const val=document.getElementById("date-picker-input").value;
  if(val){state.activeDate=val;state.view="day";state.filter="todas";}
  closeModal("date-modal"); render();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function buildModalPri(selected){
  const row=document.getElementById("pri-row"); row.innerHTML="";
  PRIORITIES.forEach(p=>{
    const b=document.createElement("button"); b.className="pri-btn";
    b.style.borderColor=selected===p.key?p.dot:"var(--border)";
    b.style.background=selected===p.key?p.bg:"var(--card)";
    b.style.color=selected===p.key?p.text:"var(--text3)";
    b.innerHTML='<div style="width:8px;height:8px;border-radius:50%;background:'+p.dot+';margin:0 auto 4px"></div>'+p.label;
    b.onclick=()=>{state.selectedPri=p.key;buildModalPri(p.key);};
    row.appendChild(b);
  });
}
function buildModalCat(selected){
  const row=document.getElementById("cat-row"); row.innerHTML="";
  CATEGORIES.forEach(c=>{
    const b=document.createElement("button");
    b.className="cat-btn"+(selected===c.key?" active":"");
    b.textContent=c.icon+" "+c.key;
    b.onclick=()=>{state.selectedCat=c.key;buildModalCat(c.key);};
    row.appendChild(b);
  });
}
function openAddModal(){
  state.editingTaskId=null; state.selectedPri="média"; state.selectedCat="outro";
  document.getElementById("modal-title-text").textContent="Nova atividade — "+dateLabel(state.activeDate);
  document.getElementById("task-title-input").value="";
  document.getElementById("task-time-input").value="";
  document.getElementById("task-note-input").value="";
  document.getElementById("modal-save-btn").textContent="Adicionar atividade";
  buildModalPri("média"); buildModalCat("outro");
  document.getElementById("task-modal").style.display="flex";
  setTimeout(()=>document.getElementById("task-title-input").focus(),100);
}
function openEditModal(taskId){
  const day=getDay(state.activeDate);
  const task=day.tasks.find(t=>t.id===taskId);
  if(!task) return;
  state.editingTaskId=taskId;
  state.selectedPri=task.priority||"média";
  state.selectedCat=task.category||"outro";
  document.getElementById("modal-title-text").textContent="Editar atividade";
  document.getElementById("task-title-input").value=task.title||"";
  document.getElementById("task-time-input").value=task.time||"";
  document.getElementById("task-note-input").value=task.note||"";
  document.getElementById("modal-save-btn").textContent="Salvar alterações";
  buildModalPri(state.selectedPri); buildModalCat(state.selectedCat);
  document.getElementById("task-modal").style.display="flex";
  const actEl=document.getElementById("ta-"+taskId);
  if(actEl) actEl.style.display="none";
}
function saveTask(){
  const title=document.getElementById("task-title-input").value.trim();
  if(!title) return;
  const task={
    title, time:document.getElementById("task-time-input").value,
    priority:state.selectedPri, category:state.selectedCat,
    note:document.getElementById("task-note-input").value.trim(),
  };
  const day=getDay(state.activeDate);
  if(state.editingTaskId){
    const idx=day.tasks.findIndex(t=>t.id===state.editingTaskId);
    if(idx>=0) day.tasks[idx]={...day.tasks[idx],...task};
    showToast("Atualizada ✓");
  } else {
    day.tasks.push({...task,id:uid(),done:false,createdAt:Date.now()});
    showToast("Atividade adicionada ✓");
  }
  setDay(state.activeDate,day);
  closeModal("task-modal"); render();
}
function closeModal(id){document.getElementById(id).style.display="none";}
function handleOverlayClick(e,id){if(e.target.id===id) closeModal(id);}

document.getElementById("task-title-input").addEventListener("keydown",e=>{if(e.key==="Enter")saveTask();});

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

load(); render();
</script>
</body>
</html>
